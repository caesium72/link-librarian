<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0a0a0b;
      color: #e4e4e7;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #27272a;
    }
    .header h1 {
      font-size: 14px;
      font-weight: 600;
      font-family: monospace;
    }
    .header img { width: 20px; height: 20px; border-radius: 4px; }
    .setup-section, .save-section { display: none; }
    .setup-section.active, .save-section.active { display: block; }
    label {
      display: block;
      font-size: 11px;
      font-family: monospace;
      color: #a1a1aa;
      margin-bottom: 6px;
    }
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #27272a;
      border-radius: 6px;
      background: #18181b;
      color: #e4e4e7;
      font-family: monospace;
      font-size: 12px;
      outline: none;
      margin-bottom: 8px;
    }
    input:focus { border-color: #6d28d9; }
    button {
      width: 100%;
      padding: 8px;
      border: none;
      border-radius: 6px;
      font-family: monospace;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: #7c3aed; color: white; }
    .btn-outline {
      background: transparent;
      color: #a1a1aa;
      border: 1px solid #27272a;
      margin-top: 8px;
    }
    .btn-save { background: #7c3aed; color: white; }
    .status {
      margin-top: 12px;
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 11px;
      font-family: monospace;
      display: none;
    }
    .status.success { display: block; background: #052e16; color: #4ade80; border: 1px solid #166534; }
    .status.error { display: block; background: #2a0a0a; color: #f87171; border: 1px solid #7f1d1d; }
    .status.duplicate { display: block; background: #1c1917; color: #fbbf24; border: 1px solid #78350f; }
    .page-info {
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 6px;
      padding: 10px;
      margin-bottom: 12px;
    }
    .page-title {
      font-size: 12px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
    }
    .page-url {
      font-size: 10px;
      font-family: monospace;
      color: #71717a;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .logged-in-as {
      font-size: 10px;
      color: #71717a;
      font-family: monospace;
      margin-bottom: 12px;
    }
    .footer {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid #27272a;
      text-align: center;
    }
    .footer a {
      font-size: 10px;
      color: #7c3aed;
      text-decoration: none;
      font-family: monospace;
    }
    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="header">
    <img src="icon48.png" alt="Logo">
    <h1>Link Librarian</h1>
  </div>

  <!-- Setup Section -->
  <div class="setup-section" id="setupSection">
    <label>Supabase Project URL</label>
    <input type="text" id="apiUrl" placeholder="https://xxx.supabase.co">
    <label>Access Token</label>
    <input type="password" id="accessToken" placeholder="Paste from Settings page">
    <button class="btn-primary" id="saveConfigBtn">Save Configuration</button>
    <div class="status" id="setupStatus"></div>
  </div>

  <!-- Save Section -->
  <div class="save-section" id="saveSection">
    <div class="logged-in-as" id="loggedInAs"></div>
    <div class="page-info">
      <div class="page-title" id="pageTitle">Loading...</div>
      <div class="page-url" id="pageUrl">Loading...</div>
    </div>
    <button class="btn-save" id="saveBtn">Save to Library</button>
    <div class="status" id="saveStatus"></div>
    <div class="footer">
      <button class="btn-outline" id="settingsBtn">⚙ Settings</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
